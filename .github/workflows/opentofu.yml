# Based on:
# https://github.com/opentofu/setup-opentofu

# When we create a pull request (PR) to the main branch, this workflow runs `tofu plan`, and adds the output as a comment to the PR. If the plan looks good, we merge (ie. push) the code to the main branch. On push to main, this runs a `tofu apply`.
on:
  push:
    branches:
      - main
    paths:
      - cluster/**
  pull_request:
    branches:
      - main
    paths:
      - cluster/**
defaults:
  run:
    working-directory: cluster
permissions:
  id-token: write
  contents: read
  pull-requests: write
jobs:
  opentofu:
    runs-on: ubuntu-latest
    steps:

      # If this workflow is running in template repo, use LocalStack to test it.
      - if: github.repository == 'devopscoop/aws-eks-template'
        uses: LocalStack/setup-localstack@9392b05ddb345894c2e86305fc426566e738c1db # v0.2.4
      - if: github.repository == 'devopscoop/aws-eks-template'
        uses: aws-actions/configure-aws-credentials@a03048d87541d1d9fcf2ecf528a4a65ba9bd7838 # v5.0.0
        with:
          aws-access-key-id: test
          aws-secret-access-key: test
          aws-region: us-east-1

      - if: github.repository != 'devopscoop/aws-eks-template'
        uses: aws-actions/configure-aws-credentials@a03048d87541d1d9fcf2ecf528a4a65ba9bd7838 # v5.0.0
        with:
          # This will be overwritten with the correct region by quickstart.sh.
          aws-region: us-east-2
          # This must be manually updated to our actual ARN.
          role-to-assume: arn:aws:iam::999999999999:role/github-actions-dev-tf-Role-REDACTED
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: opentofu/setup-opentofu@000eeb8522f0572907c393e8151076c205fdba1b # v1.0.6
      # https://github.com/magnetikonline/terraform-github-action-cache-example
      - name: Configure Terraform plugin cache
        run: |
          echo "TF_PLUGIN_CACHE_DIR=$HOME/.terraform.d/plugin-cache" >>"$GITHUB_ENV"
          mkdir --parents "$HOME/.terraform.d/plugin-cache"
      - uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: |
            ~/.terraform.d/plugin-cache
          key: terraform-${{ runner.os }}-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-${{ runner.os }}-
      - id: fmt
        run: tofu fmt -recursive -check
        continue-on-error: true
      - id: init
        run: tofu init
      - id: validate
        run: tofu validate -no-color
      # Adding this because module.eks_blueprints_addons.module.aws_efs_csi_driver.helm_release.this[0] requires the AWS CLI.
      # https://docs.aws.amazon.com/cli/latest/userguide/getting-started-version.html
      - name: Install AWS CLI v2
        run: |
          if ! command -v aws &>/dev/null; then
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64-2.28.16.zip" -o "awscliv2.zip"
            unzip awscliv2.zip
            ./aws/install
          fi
      - id: plan
        run: tofu plan -no-color -input=false -out=plan.file
        continue-on-error: true
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        if: github.event_name == 'pull_request'
        env:
          PLAN: "tofu\n${{ steps.plan.outputs.stdout }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: "const output = `#### OpenTofu Format and Style \U0001F58C\\`${{ steps.fmt.outcome }}\\`\n#### OpenTofu Initialization ⚙️\\`${{ steps.init.outcome }}\\`\n#### OpenTofu Validation \U0001F916\\`${{ steps.validate.outcome }}\\`\n<details><summary>Validation Output</summary>\n\n\\`\\`\\`\\n\n${{ steps.validate.outputs.stdout }}\n\\`\\`\\`\n\n</details>\n\n#### OpenTofu Plan \U0001F4D6\\`${{ steps.plan.outcome }}\\`\n\n<details><summary>Show Plan</summary>\n\n\\`\\`\\`\\n\n${process.env.PLAN}\n\\`\\`\\`\n\n</details>\n\n*Pusher: @${{ github.actor }}, Action: \\`${{ github.event_name }}\\`, Working Directory: \\`${{ env.tf_actions_working_dir }}\\`, Workflow: \\`${{ github.workflow }}\\`*`;\n\ngithub.rest.issues.createComment({\n  issue_number: context.issue.number,\n  owner: context.repo.owner,\n  repo: context.repo.repo,\n  body: output\n})\n"
      - if: github.ref == 'refs/heads/main'
        run: tofu apply -no-color -input=false plan.file
